server {
  listen 80;
  server_name _;
  client_max_body_size 10m;
  location /api/ { proxy_pass http://backend:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
  location /uploads/ { proxy_pass http://backend:8080; proxy_set_header Host $host; }
  location /actuator/ { proxy_pass http://backend:8080; access_log off; }
  location /admin/ { proxy_pass http://admin:80; proxy_set_header Host $host; }
  location / { proxy_pass http://web:3000; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; proxy_buffering off; }
}
